<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- CSP: bloqueia inline scripts, permite apenas origens confiáveis -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self';
             style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
             font-src https://fonts.gstatic.com;
             connect-src 'self' https://script.google.com https://script.googleusercontent.com;
             img-src 'self' data:;
             frame-src 'none';
             object-src 'none';
             base-uri 'self';">

  <meta name="referrer" content="no-referrer">
  <meta name="robots" content="noindex, nofollow">

  <title>Meus Agendamentos</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Botão de tema -->
  <button id="themeToggle" class="theme-toggle" type="button" aria-label="Alternar tema claro/escuro">
    <svg id="iconMoon" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="iconSun" class="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <main class="container">

    <!-- Header -->
    <header class="header">
      <div class="header-glow"></div>
      <h1 class="header-title">Meus Agendamentos</h1>
      <p class="header-sub">Consulte, cancele ou remarque seus horários</p>
    </header>

    <!-- Formulário -->
    <section id="formSection" class="card form-card">
      <form id="consultaForm" novalidate autocomplete="off">

        <div class="field-group">
          <label for="inputNome" class="field-label">Qual seu nome completo?</label>
          <input
            type="text"
            id="inputNome"
            class="field-input"
            placeholder="Maria da Silva"
            maxlength="100"
            required
            autocomplete="name"
          >
          <span class="field-error" id="errorNome"></span>
        </div>

        <div class="field-group">
          <label for="inputDOB" class="field-label">Qual sua data de nascimento?</label>
          <input
            type="text"
            id="inputDOB"
            class="field-input"
            placeholder="DD/MM/AAAA"
            maxlength="10"
            inputmode="numeric"
            required
          >
          <span class="field-error" id="errorDOB"></span>
        </div>

        <div class="field-group">
          <label for="inputCPF" class="field-label">Qual seu CPF?</label>
          <input
            type="text"
            id="inputCPF"
            class="field-input"
            placeholder="000.000.000-00"
            maxlength="14"
            inputmode="numeric"
            required
          >
          <span class="field-error" id="errorCPF"></span>
        </div>

        <div class="field-row">
          <div class="field-group field-ddd">
            <label for="inputDDD" class="field-label">DDD (sem o 0)</label>
            <input
              type="text"
              id="inputDDD"
              class="field-input"
              placeholder="34"
              maxlength="2"
              inputmode="numeric"
              required
            >
            <span class="field-error" id="errorDDD"></span>
          </div>

          <div class="field-group field-phone">
            <label for="inputTelefone" class="field-label">Seu telefone (sem DDD)</label>
            <input
              type="text"
              id="inputTelefone"
              class="field-input"
              placeholder="997758727"
              maxlength="9"
              inputmode="numeric"
              required
            >
            <span class="field-error" id="errorTelefone"></span>
          </div>
        </div>

        <button type="submit" id="btnConsultar" class="btn btn-primary">
          <span class="btn-text">Consultar Agendamentos</span>
          <span class="btn-loader" style="display:none;">
            <span class="spinner"></span> Consultando...
          </span>
        </button>
      </form>
    </section>

    <!-- Resultados -->
    <section id="resultSection" class="results-section" style="display:none;">
      <div class="results-header">
        <h2 class="results-title" id="resultTitle"></h2>
        <button type="button" id="btnVoltar" class="btn btn-outline btn-sm">Nova consulta</button>
      </div>
      <div id="resultList" class="results-list"></div>
      <div id="resultEmpty" class="results-empty" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>Nenhum agendamento futuro encontrado.</p>
      </div>
    </section>

    <!-- Modal de Confirmação -->
    <div id="modalOverlay" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h3 class="modal-title" id="modalTitle"></h3>
        <p class="modal-text" id="modalText"></p>
        <div class="modal-actions">
          <button type="button" id="modalCancel" class="btn btn-outline btn-sm">Voltar</button>
          <button type="button" id="modalConfirm" class="btn btn-danger btn-sm">
            <span class="btn-text" id="modalConfirmText"></span>
            <span class="btn-loader" style="display:none;">
              <span class="spinner"></span>
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- Modal de Link (remarcação) -->
    <div id="linkOverlay" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
      <div class="modal-card">
        <svg class="link-success-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <h3 class="modal-title" id="linkTitle"></h3>
        <p class="modal-text" id="linkText"></p>
        <a id="linkHref" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-sm">Escolher novo horário</a>
        <button type="button" id="linkClose" class="btn btn-outline btn-sm" style="margin-top: 0.5rem;">Fechar</button>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p> <span id="yearFooter"></span> </p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
